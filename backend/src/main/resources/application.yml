server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/account_book?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mvc:
    path-match:
      matching-strategy: ant_path_matcher